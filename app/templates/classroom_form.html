{% extends "base.html" %}
{% block title %}{{ 'Editar' if classroom else 'Nuevo' }} Salon - Inventario Escolar{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <a href="/classrooms" class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-600 transition-colors">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </a>
        <h1 class="text-2xl font-bold text-gray-800">{{ 'Editar' if classroom else 'Nuevo' }} Salon</h1>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <form method="POST" action="{{ '/classrooms/' ~ classroom.id if classroom else '/classrooms' }}" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nombre del Salon</label>
                <input type="text" name="nombre" value="{{ classroom.nombre if classroom else '' }}" required
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none"
                    placeholder="Ej: Aula 101">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Codigo</label>
                <input type="text" name="codigo" value="{{ classroom.codigo if classroom else '' }}" required
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none"
                    placeholder="Ej: A101">
            </div>
            <div class="flex items-center gap-3 pt-2">
                <button type="submit" class="px-5 py-2.5 bg-primary-600 hover:bg-primary-700 text-white font-medium rounded-lg text-sm transition-colors">
                    {{ 'Actualizar' if classroom else 'Crear' }}
                </button>
                <a href="/classrooms" class="px-5 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium rounded-lg text-sm transition-colors">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
