{% extends "base.html" %}
{% block title %}{{ 'Editar' if teacher else 'Nuevo' }} Profesor - Inventario Escolar{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="flex items-center gap-3 mb-6">
        <a href="/teachers" class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-600 transition-colors">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </a>
        <h1 class="text-2xl font-bold text-gray-800">{{ 'Editar' if teacher else 'Nuevo' }} Profesor</h1>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <form method="POST" action="{{ '/teachers/' ~ teacher.id if teacher else '/teachers' }}" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nombre Completo</label>
                <input type="text" name="nombre" value="{{ teacher.nombre if teacher else '' }}" required
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none"
                    placeholder="Ej: Maria Lopez">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" value="{{ teacher.email if teacher else '' }}" required
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none"
                    placeholder="profesor@escuela.cl">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Salon (opcional)</label>
                <select name="classroom_id" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500 outline-none">
                    <option value="">-- Sin salon --</option>
                    {% for c in classrooms %}
                    <option value="{{ c.id }}" {% if teacher and teacher.classroom_id == c.id %}selected{% endif %}>{{ c.nombre }} ({{ c.codigo }})</option>
                    {% endfor %}
                </select>
            </div>
            {% if not teacher %}
            <div class="p-3 bg-primary-50 border border-primary-200 text-primary-700 rounded-lg text-sm">
                La contrasena por defecto es: <strong>cambio123</strong>
            </div>
            {% endif %}
            <div class="flex items-center gap-3 pt-2">
                <button type="submit" class="px-5 py-2.5 bg-primary-600 hover:bg-primary-700 text-white font-medium rounded-lg text-sm transition-colors">
                    {{ 'Actualizar' if teacher else 'Crear' }}
                </button>
                <a href="/teachers" class="px-5 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium rounded-lg text-sm transition-colors">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
